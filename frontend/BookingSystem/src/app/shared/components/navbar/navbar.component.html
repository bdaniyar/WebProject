<nav class="navbar">
    <div class="container nav-inner">
        <a class="brand" routerLink="/hotels">
            <span class="brand-mark">HB</span>
            <span>Hotel Booking</span>
        </a>

        <div class="links">
            <a routerLink="/hotels" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Hotels</a>

            @if (loggedIn()) {
            <a routerLink="/bookings" routerLinkActive="active">My bookings</a>
            <button class="btn btn-secondary" type="button" (click)="logout()">Logout</button>
            } @else {
            <a routerLink="/login" routerLinkActive="active">Login</a>
            }
        </div>
    </div>
</nav>

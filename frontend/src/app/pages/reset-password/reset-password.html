<section class="panel auth-card reset-shell">
    <div class="eyebrow">Password</div>
    <h1>Reset password</h1>
    <p class="muted">Set a new password for your account.</p>

    <form class="stack" (ngSubmit)="submit()">
        <label class="label">
            New password
            <input class="field" name="new_password" [(ngModel)]="new_password" type="password"
                autocomplete="new-password" />
        </label>

        <button class="primary-btn" type="submit" [disabled]="busy()">
            {{ busy() ? 'Updating...' : 'Update password' }}
        </button>

        <a routerLink="/login" class="muted link">Back to login</a>
    </form>

    @if (error()) {
    <div class="status status-error">{{ error() }}</div>
    }

    @if (success()) {
    <div class="status status-success">{{ success() }}</div>
    }
</section>
